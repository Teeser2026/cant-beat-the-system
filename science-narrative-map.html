  const [hasInteracted, setHasInteracted] = useState(false);
  const ambientRef = useRef(null);
  const clickRef = useRef(null);

  useEffect(() => {
    if (!hasInteracted) return;
    if (!ambientRef.current) {
      const a = new Audio(AMBIENT_SRC);
      a.loop = true; a.volume = 0.18;
      ambientRef.current = a;
    }
    if (!clickRef.current) {
      clickRef.current = new Audio(CLICK_SRC);
      clickRef.current.volume = 0.06;
    }
    if (audioOn) ambientRef.current.play().catch(() => {});
  }, [hasInteracted]);

  useEffect(() => {
    if (!ambientRef.current) return;
    if (audioOn) ambientRef.current.play().catch(() => {});
    else ambientRef.current.pause();
  }, [audioOn]);

  const convergenceRef = useRef(null);
  
  useEffect(() => {
    if (!hasInteracted) return;
    if (!convergenceRef.current) {
      convergenceRef.current = new Audio(CONVERGENCE_SRC);
      convergenceRef.current.volume = 0.15;
    }
  }, [hasInteracted]);

  const playClick = (nodeId) => {
    if (!audioOn) return;
    if (nodeId === "convergence" && convergenceRef.current) {
      convergenceRef.current.currentTime = 0;
      convergenceRef.current.play().catch(() => {});
    } else if (clickRef.current) {
      clickRef.current.currentTime = 0;
      clickRef.current.play().catch(() => {});
    }
  };
  const firstInteraction = () => { if (!hasInteracted) setHasInteracted(true); };

  const sectionMap = useMemo(() => {
    const m = {};
    SECTIONS.forEach(s => { m[s.id] = s; });
    return m;
  }, []);

  const connectionLines = useMemo(() => {
    const lines = [];
    const seen = new Set();
    SECTIONS.forEach(s => {
      (s.connections || []).forEach(targetId => {
        const key = [s.id, targetId].sort().join("--");
        if (!seen.has(key) && sectionMap[targetId]) {
          seen.add(key);
          lines.push({ from: s.id, to: targetId });
        }
      });
    });
    return lines;
  }, [sectionMap]);

  const getNodeConnections = useCallback((nodeId) => {
    if (!nodeId) return new Set();
    const s = new Set();
    connectionLines.forEach(l => {
      if (l.from === nodeId || l.to === nodeId) {
        s.add(l.from);
        s.add(l.to);
      }
    });
    return s;
  }, [connectionLines]);

  const activeId = selectedId || hoveredId;
  const activeSet = useMemo(() => getNodeConnections(activeId), [activeId, getNodeConnections]);
  const selectedSection = selectedId ? sectionMap[selectedId] : null;

  const isNodeVisible = (id) => {
    if (!activeId) return true;
    if (id === activeId) return true;
    return activeSet.has(id);
  };

  return (
    <div style={{
      width: "100%",
      height: "100vh",
      background: "#0a0a0f",
      color: "#c8c8d0",

          height: 18px;
          box-shadow: 0 0 40px currentColor;
        }

        .node-label {
          position: absolute;
          bottom: 22px;
          left: 50%;
          transform: translateX(-50%);
          white-space: nowrap;
          font-size: 10px;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          font-weight: 500;
          transition: opacity 0.3s ease;
          pointer-events: none;
        }

        .connection-line {
          stroke-linecap: round;
          transition: all 0.4s ease;
        }

        .scroll-panel::-webkit-scrollbar { width: 4px; }
        .scroll-panel::-webkit-scrollbar-track { background: transparent; }
        .scroll-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .tag {
          display: inline-block;
          padding: 2px 8px;
          border: 1px solid #333;
          font-size: 9px;
          letter-spacing: 1px;
          text-transform: uppercase;
          margin: 2px;
        }

        .conn-row {
          padding: 8px 12px;
          margin-bottom: 6px;
          cursor: pointer;
          background: rgba(255,255,255,0.02);
          transition: background 0.2s ease;
        }
        .conn-row:hover { background: rgba(255,255,255,0.05); }

        @keyframes cursor-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes scan {
          0% { transform: translateY(-100%); }
          100% { transform: translateY(100vh); }
        }

        @keyframes pulse {
          0%, 100% { opacity: 0.4; }
          50% { opacity: 0.8; }
        }
      `}</style>

      {/* Header */}
      <div style={{
        padding: "16px 24px 12px", borderBottom: "1px solid #1a1a22",
        display: "flex", flexDirection: "column", alignItems: "center", gap: "12px"
      }}>
        {/* Logo */}
        <div style={{
          display: "inline-block", border: "1px solid rgba(0,255,136,0.2)",
          padding: "12px 28px", position: "relative"
        }}>
          {/* Cage bars */}
          <div style={{position: "absolute", top: "-1px", left: "0", width: "1px", height: "calc(100% + 2px)", background: "rgba(0,255,136,0.13)"}} />
          <div style={{position: "absolute", top: "-1px", left: "25%", width: "1px", height: "calc(100% + 2px)", background: "rgba(0,255,136,0.09)"}} />
          <div style={{position: "absolute", top: "-1px", right: "25%", width: "1px", height: "calc(100% + 2px)", background: "rgba(0,255,136,0.09)"}} />
          <div style={{position: "absolute", top: "-1px", right: "0", width: "1px", height: "calc(100% + 2px)", background: "rgba(0,255,136,0.13)"}} />
          {/* Title */}
          <div style={{
            fontFamily: "'Crimson Pro', serif", fontWeight: 300, fontSize: "24px",
            color: "#e0e0e8", letterSpacing: "3px", position: "relative", zIndex: 1, whiteSpace: "nowrap"
          }}>
            Can’t Beat the{" "}
            <span style={{color: "#00ff88", fontWeight: 600}}>System</span>
            <span style={{
              display: "inline-block", width: "2px", height: "22px", background: "#ff3355",
              marginLeft: "5px", verticalAlign: "middle", animation: "cursor-blink 1s step-end infinite"
            }} />
          </div>
        </div>
        {/* Tagline */}
        <div style={{
          fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontWeight: 300,
          fontSize: "13px", letterSpacing: "2px", color: "rgba(0,255,136,0.4)"
        }}>the cage is comfortable</div>
        {/* Nav */}
        <div style={{display: "flex", gap: "8px", flexWrap: "wrap", justifyContent: "center", alignItems: "center"}}>
          <div style={{
            background: "rgba(0,255,136,0.05)", border: "1px solid #00ff88",
            color: "#00ff88", padding: "8px 16px",
            fontFamily: "'IBM Plex Mono', monospace",
            fontSize: "11px", letterSpacing: "1.5px", textTransform: "uppercase"
          }}>
            Science & Bio-Digital Convergence Narrative
          </div>
          <button
            onClick={(e) => { e.stopPropagation(); firstInteraction(); setAudioOn(!audioOn); }}
            style={{
              background: "none", border: "1px solid #333",
              color: audioOn ? "#00ff88" : "#555",
              fontSize: "14px", cursor: "pointer", padding: "4px 8px", borderRadius: "3px",
              transition: "all 0.3s"
            }}
            title={audioOn ? "Mute" : "Unmute"}
          >
            {audioOn ? "\uD83D\uDD0A" : "\uD83D\uDD07"}
          </button>
        </div>
      </div>

      {/* Main: map + sidebar */}
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>

        {/* Map */}
        <div
          style={{ flex: 1, position: "relative", overflow: "hidden" }}
          onClick={() => { setSelectedId(null); firstInteraction(); }}
        >
          {/* Scan line */}
          <div style={{
            position: "absolute", top: 0, left: 0, right: 0, height: "1px",
            background: "rgba(0,255,136,0.12)", animation: "scan 10s linear infinite", zIndex: 1
          }} />

          {/* Connection lines */}
          <svg style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", zIndex: 2, pointerEvents: "none" }}>
            {connectionLines.map(({ from, to }) => {
              const a = sectionMap[from];
              const b = sectionMap[to];
              if (!a || !b) return null;
              const lineActive = activeId && (from === activeId || to === activeId);
              const dimmed = activeId && !lineActive;
              return (
                <line
                  key={`${from}--${to}`}
                  className="connection-line"
                  x1={`${a.x}%`} y1={`${a.y}%`}
                  x2={`${b.x}%`} y2={`${b.y}%`}
                  stroke={lineActive ? (sectionMap[activeId]?.color || "#fff") : "#333"}
                  strokeWidth={lineActive ? 1.5 : 0.7}
                  opacity={dimmed ? 0.03 : lineActive ? 0.55 : 0.1}
                />
              );
            })}
          </svg>

          {/* Convergence pulse ring */}
          <div style={{
            position: "absolute",
            left: "50%", top: "38%",
            transform: "translate(-50%, -50%)",
            width: "64px", height: "64px",
            borderRadius: "50%",
            border: "1px solid rgba(255,170,34,0.2)",
            background: "rgba(255,170,34,0.03)",
            animation: "pulse 3s ease-in-out infinite",
            pointerEvents: "none",
            zIndex: 3
          }} />

          {/* Nodes */}
          {SECTIONS.map(section => {
            const isSel = selectedId === section.id;
            const visible = isNodeVisible(section.id);
            const isConv = section.id === "convergence";

            return (
              <div
                key={section.id}
                className="node-wrapper"
                style={{
                  left: `${section.x}%`,
                  top: `${section.y}%`,
                  transform: "translate(-50%, -50%)",
                  opacity: visible ? 1 : 0.12,
                  zIndex: isSel ? 20 : 10
                }}
                onClick={(e) => {
                  e.stopPropagation(); firstInteraction(); playClick(section.id);
                  setSelectedId(prev => prev === section.id ? null : section.id);
                }}
                onMouseEnter={() => setHoveredId(section.id)}
                onMouseLeave={() => setHoveredId(null)}
              >
                <div className="node-label" style={{
                  color: section.color,
                  opacity: isSel || hoveredId === section.id ? 1 : 0.5,
                  fontSize: "10px",
                  fontWeight: isConv ? 600 : 500
                }}>
                  {section.title}
                </div>
                <div className="node-dot" style={{
                  background: section.color,
                  color: section.color,
                  width: isConv ? "18px" : undefined,
                  height: isConv ? "18px" : undefined,
                  boxShadow: isConv ? `0 0 30px ${section.color}` : undefined
                }} />
              </div>
            );
          })}
        </div>

        {/* Right sidebar */}
        <div className="scroll-panel" style={{
          width: "380px",
          flexShrink: 0,
          background: "rgba(10,10,15,0.95)",
          borderLeft: "1px solid #222",
          padding: "20px",
          fontSize: "12px",
          lineHeight: "1.7",
          overflowY: "auto"
        }}>
          {selectedSection ? (
            <div>
              {/* Dot + title */}
              <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "16px" }}>
                <div style={{
                  width: "10px", height: "10px", borderRadius: "50%",
                  background: selectedSection.color,
                  boxShadow: `0 0 15px ${selectedSection.color}`,
                  flexShrink: 0
                }} />
                <span style={{ fontSize: "14px", fontWeight: 600, color: selectedSection.color, letterSpacing: "1px" }}>
                  {selectedSection.title}
                </span>
              </div>

              {/* Part badge */}
              <div style={{
                fontSize: "9px", color: "#888", letterSpacing: "1px", textTransform: "uppercase",
                marginBottom: "12px", padding: "4px 8px", border: "1px solid #333", display: "inline-block"
              }}>
                {selectedSection.partLabel} · {selectedSection.num}
              </div>

              {/* Summary */}
              <p style={{ color: "#999", lineHeight: 1.8, marginBottom: "16px" }}>
                {selectedSection.summary}
              </p>

              {/* Keywords */}
              <div style={{ marginBottom: "16px" }}>
                <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>Keywords</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "4px" }}>
                  {selectedSection.keywords.map(kw => (
                    <span key={kw} className="tag" style={{ color: selectedSection.color, borderColor: `${selectedSection.color}44` }}>
                      {kw}
                    </span>
                  ))}
                </div>
              </div>

              {/* Connections */}
              {selectedSection.connections?.length > 0 && (
                <div>
                  <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>
                    Connections ({selectedSection.connections.length})
                  </div>
                  {selectedSection.connections.map(connId => {
                    const conn = sectionMap[connId];
                    if (!conn) return null;
                    return (
                      <div
                        key={connId}
                        className="conn-row"
                        style={{ borderLeft: `2px solid ${conn.color}` }}
                        onClick={() => { playClick(connId); setSelectedId(connId); }}
                      >
                        <div style={{ fontSize: "10px", color: conn.color }}>
                          → {conn.num} {conn.title}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          ) : (
            <div>
              <p style={{ color: "#666", marginBottom: "16px" }}>Click a node to explore.</p>
              <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "12px" }}>
                {SECTIONS.length} sections · {connectionLines.length} connections
              </div>

              {/* Legend */}
              <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>Legend</div>
              <div style={{ display: "flex", flexDirection: "column", gap: "6px", marginBottom: "16px" }}>
                {[
                  { label: "Documented Science", color: "#00ff88" },
                  { label: "The Convergence", color: "#ffaa22" },
                  { label: "Game Framework", color: "#ff6644" },
                  { label: "Reader Discovery", color: "#44aaff" }
                ].map(item => (
                  <div key={item.label} style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                    <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: item.color, flexShrink: 0 }} />
                    <span style={{ fontSize: "10px", color: "#888" }}>{item.label}</span>
                  </div>
                ))}
              </div>

              {/* All nodes */}
              <div style={{ borderTop: "1px solid #1a1a22", paddingTop: "12px" }}>
                {SECTIONS.map(s => (
                  <div
                    key={s.id}
                    style={{
                      display: "flex", alignItems: "center", gap: "8px",
                      padding: "3px 0", cursor: "pointer"
                    }}
                    onClick={() => { playClick(s.id); setSelectedId(s.id); }}
                    onMouseEnter={() => setHoveredId(s.id)}
                    onMouseLeave={() => setHoveredId(null)}
                  >
                    <div style={{ width: "6px", height: "6px", borderRadius: "50%", background: s.color, flexShrink: 0 }} />
                    <span style={{ fontSize: "10px", color: s.color, opacity: 0.6, minWidth: "36px" }}>{s.num}</span>
                    <span style={{ fontSize: "10px", color: "#888" }}>{s.title}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ScienceNarrativeMap));
</script>
</body>
</html>
