// ─── MAIN APP ───

function App() {
  const [activeTab, setActiveTab] = useState("map");
  const [selectedNode, setSelectedNode] = useState(null);
  const [hoveredNode, setHoveredNode] = useState(null);

  const connections = useMemo(() => {
    const conns = [];
    const seen = new Set();
    SECTIONS.forEach(s => {
      (s.connections || []).forEach(targetId => {
        const key = [s.id, targetId].sort().join("--");
        if (!seen.has(key)) {
          seen.add(key);
          const target = SECTIONS.find(t => t.id === targetId);
          if (target) conns.push({ from: s, to: target, key });
        }
      });
    });
    return conns;
  }, []);

  const activeConnections = useMemo(() => {
    if (!selectedNode) return new Set();
    const s = SECTIONS.find(n => n.id === selectedNode);
    if (!s) return new Set();
    const ids = new Set(s.connections || []);
    ids.add(s.id);
    return ids;
  }, [selectedNode]);

  const renderMap = () => (
    <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
      {/* Map area */}
      <div style={{ flex: 1, position: "relative", overflow: "hidden", background: "#0a0a0f" }}>
        {/* Scan line */}
        <div style={{
          position: "absolute", top: 0, left: 0, width: "100%", height: "1px",
          background: "rgba(0,255,136,0.12)", animation: "scan 10s linear infinite", zIndex: 1
        }} />

        {/* SVG connections */}
        <svg style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", zIndex: 2 }}>
          {connections.map(c => {
            const isActive = selectedNode && (activeConnections.has(c.from.id) && activeConnections.has(c.to.id));
            const isDimmed = selectedNode && !isActive;
            return (
              <line
                key={c.key}
                x1={`${c.from.x}%`} y1={`${c.from.y}%`}
                x2={`${c.to.x}%`} y2={`${c.to.y}%`}
                stroke={isActive ? c.from.color : "#333"}
                strokeWidth={isActive ? 1.5 : 0.7}
                opacity={isDimmed ? 0.03 : isActive ? 0.55 : 0.1}
                style={{ transition: "all 0.3s" }}
              />
            );
          })}
        </svg>

        {/* Nodes */}
        {SECTIONS.map(s => {
          const isSelected = selectedNode === s.id;
          const isConnected = activeConnections.has(s.id);
          const isDimmed = selectedNode && !isConnected;
          const isHovered = hoveredNode === s.id;
          const dotSize = isHovered || isSelected ? 18 : 14;

          return (
            <div
              key={s.id}
              onClick={() => setSelectedNode(isSelected ? null : s.id)}
              onMouseEnter={() => setHoveredNode(s.id)}
              onMouseLeave={() => setHoveredNode(null)}
              style={{
                position: "absolute",
                left: `${s.x}%`, top: `${s.y}%`,
                transform: "translate(-50%, -50%)",
                cursor: "pointer", zIndex: 3,
                opacity: isDimmed ? 0.15 : 1,
                transition: "all 0.3s",
                display: "flex", flexDirection: "column", alignItems: "center", gap: "6px"
              }}
            >
              {/* Label */}
              <div style={{
                fontFamily: "'IBM Plex Mono', monospace",
                fontSize: "10px", letterSpacing: "1.5px", textTransform: "uppercase",
                color: s.color, whiteSpace: "nowrap", textAlign: "center",
                textShadow: `0 0 10px ${s.color}40`
              }}>
                {s.title}
              </div>
              {/* Dot */}
              <div style={{
                width: `${dotSize}px`, height: `${dotSize}px`, borderRadius: "50%",
                background: s.color,
                boxShadow: `0 0 ${isSelected ? 30 : 20}px ${s.color}`,
                transition: "all 0.2s"
              }} />
            </div>
          );
        })}
      </div>

      {/* Sidebar */}
      <div className="scroll-panel" style={{
        width: "380px", background: "rgba(10,10,15,0.95)",
        borderLeft: "1px solid #222", padding: "20px",
        fontFamily: "'IBM Plex Mono', monospace",
        fontSize: "12px", lineHeight: "1.7", overflowY: "auto", color: "#c8c8d0"
      }}>
        {selectedNode ? (() => {
          const s = SECTIONS.find(n => n.id === selectedNode);
          return (
            <div>
              <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "4px" }}>
                {s.num} — {s.partLabel}
              </div>
              <div style={{
                fontFamily: "'Space Grotesk', sans-serif",
                fontSize: "16px", color: "#e0e0e8", letterSpacing: "1px", marginBottom: "12px"
              }}>
                {s.title}
              </div>
              <p style={{ fontSize: "11px", color: "#999", lineHeight: 1.8, marginBottom: "16px" }}>
                {s.summary}
              </p>
              {/* Keywords */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", marginBottom: "16px" }}>
                {s.keywords.map(k => (
                  <span key={k} style={{
                    display: "inline-block", padding: "2px 8px",
                    border: `1px solid #333`, fontSize: "9px",
                    letterSpacing: "1px", textTransform: "uppercase", color: s.color
                  }}>{k}</span>
                ))}
              </div>
              {/* Connections */}
              <div style={{ fontSize: "8px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>
                Connections
              </div>
              {(s.connections || []).map(cId => {
                const target = SECTIONS.find(t => t.id === cId);
                if (!target) return null;
                return (
                  <div key={cId}
                    onClick={(e) => { e.stopPropagation(); setSelectedNode(cId); }}
                    style={{
                      padding: "6px 10px", borderLeft: `1px dashed ${target.color}`,
                      marginBottom: "4px", cursor: "pointer", background: "rgba(255,255,255,0.01)",
                      transition: "background 0.2s"
                    }}
                    onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.04)"}
                    onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.01)"}
                  >
                    <span style={{ fontSize: "9px", color: target.color }}>{target.num}</span>
                    <span style={{ fontSize: "10px", color: "#ccc", marginLeft: "8px" }}>{target.title}</span>
                  </div>
                );
              })}
            </div>
          );
        })() : (
          <div>
            <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "12px" }}>
              Theological Framework v4.3
            </div>
            <div style={{
              fontFamily: "'Space Grotesk', sans-serif",
              fontSize: "16px", color: "#e0e0e8", letterSpacing: "1px", marginBottom: "16px"
            }}>
              The Metaphysics of the Endgame
            </div>
            <p style={{ fontSize: "11px", color: "#777", lineHeight: 1.8, marginBottom: "20px" }}>
              Click any node to explore the theological architecture that underpins CBTS's factions, endings, and deepest thematic layer.
            </p>
            <p style={{ fontSize: "11px", color: "#777", lineHeight: 1.8, marginBottom: "20px" }}>
              This answers: "Why does what's happening matter beyond surveillance and control?" — the layer that elevates CBTS from clever surveillance game to something that asks genuinely disturbing questions about what it means to be human.
            </p>

            {/* Legend */}
            <div style={{ fontSize: "8px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "12px" }}>
              Node Groups
            </div>
            {Object.entries(PART_LABELS).map(([k, label]) => (
              <div key={k} style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
                <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: PART_COLORS[k], flexShrink: 0 }} />
                <span style={{ fontSize: "10px", color: "#888" }}>{label}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  const renderContentTab = (title, source, items) => (
    <div className="scroll-panel" style={{ height: "calc(100vh - 140px)", padding: "24px", overflowY: "auto" }}>
      <div style={{ maxWidth: "800px", margin: "0 auto" }}>
        <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "4px" }}>
          {source}
        </div>
        <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: "16px", color: "#e0e0e8", letterSpacing: "1px", marginBottom: "8px" }}>
          {title}
        </h2>
        <p style={{ fontSize: "11px", color: "#777", lineHeight: 1.7, marginBottom: "24px" }}>
          The theological, philosophical, and metaphysical architecture of CBTS. The game never preaches — it presents the evidence, shows the consequences, and lets the player's own worldview do the heavy lifting.
        </p>

        {items.map((item, i) => (
          <div key={i} style={{
            borderLeft: `3px solid ${item.color}`, padding: "16px 20px",
            margin: "16px 0", background: "rgba(255,255,255,0.02)"
          }}>
            <div style={{
              fontSize: "10px", color: item.color, letterSpacing: "1.5px",
              textTransform: "uppercase", fontWeight: 600, marginBottom: "4px"
            }}>
              {item.title}
            </div>
            <div style={{ fontSize: "8px", color: "#555", letterSpacing: "1px", marginBottom: "12px" }}>
              {item.sub}
            </div>
            <p style={{ fontSize: "11px", color: "#999", lineHeight: 1.8, marginBottom: "12px" }}>
              {item.body}
            </p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "4px" }}>
              {item.tags.map(t => (
                <span key={t} style={{
                  display: "inline-block", padding: "2px 8px",
                  border: "1px solid #333", fontSize: "9px",
                  letterSpacing: "1px", textTransform: "uppercase", color: item.color
                }}>{t}</span>
              ))}
            </div>
          </div>
        ))}

        <div style={{ height: "60px" }} />
      </div>
    </div>
  );

  const tabs = [
    { id: "map", label: "Node Map" },
    { id: "genealogy", label: "Genealogy" },
    { id: "core", label: "Core Theology" },
    { id: "endings", label: "Endings & NPCs" },
    { id: "factions", label: "Factions & Design" }
  ];

  return (
    <div style={{
      width: "100%", height: "100vh", display: "flex", flexDirection: "column",
      background: "#0a0a0f", color: "#c8c8d0",
      fontFamily: "'IBM Plex Mono', monospace"
    }}>
      {/* Header */}
      <div style={{
        padding: "16px 24px 12px", borderBottom: "1px solid #1a1a22",
        display: "flex", flexDirection: "column", alignItems: "center", gap: "12px"
      }}>
        {/* Logo */}
        <div style={{
          display: "inline-block", border: "1px solid rgba(0,255,136,0.2)",
          padding: "12px 28px", position: "relative"
        }}>
          <div style={{ position: "absolute", top: "-1px", left: "0", width: "1px", height: "calc(100% + 2px)", background: "rgba(0,255,136,0.13)" }} />
          <div style={{ position: "absolute", top: "-1px", left: "25%", width: "1px", height: "calc(100% + 2px)", background: "rgba(0,255,136,0.09)" }} />
          <div style={{ position: "absolute", top: "-1px", right: "25%", width: "1px", height: "calc(100% + 2px)", background: "rgba(0,255,136,0.09)" }} />
          <div style={{ position: "absolute", top: "-1px", right: "0", width: "1px", height: "calc(100% + 2px)", background: "rgba(0,255,136,0.13)" }} />
          <div style={{
            fontFamily: "'Crimson Pro', serif", fontWeight: 300, fontSize: "24px",
            color: "#e0e0e8", letterSpacing: "3px", position: "relative", zIndex: 1, whiteSpace: "nowrap"
          }}>
            Can't Beat the{" "}
            <span style={{ color: "#00ff88", fontWeight: 600 }}>System</span>
            <span style={{
              display: "inline-block", width: "2px", height: "22px", background: "#ff3355",
              marginLeft: "5px", verticalAlign: "middle", animation: "cursor-blink 1s step-end infinite"
            }} />
          </div>
        </div>
        {/* Tagline */}
        <div style={{
          fontFamily: "'Crimson Pro', serif", fontStyle: "italic", fontWeight: 300,
          fontSize: "13px", letterSpacing: "2px", color: "rgba(0,255,136,0.4)"
        }}>the cage is comfortable</div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", justifyContent: "center" }}>
          {tabs.map(t => (
            <button
              key={t.id}
              onClick={() => setActiveTab(t.id)}
              style={{
                background: activeTab === t.id ? "rgba(0,255,136,0.05)" : "none",
                border: activeTab === t.id ? "1px solid #00ff88" : "1px solid #333",
                color: activeTab === t.id ? "#00ff88" : "#555",
                padding: "8px 16px", cursor: "pointer",
                fontFamily: "'IBM Plex Mono', monospace",
                fontSize: "11px", letterSpacing: "1.5px", textTransform: "uppercase",
                transition: "all 0.3s"
              }}
            >{t.label}</button>
          ))}
        </div>
      </div>

      {/* Content */}
      {activeTab === "map" && renderMap()}
      {activeTab === "genealogy" && renderContentTab(
        "The Theological Genealogy — Kabbalah to Transhumanism",
        "Theological Framework v4.3 — §1",
        GENEALOGY_CONTENT
      )}
      {activeTab === "core" && renderContentTab(
        "Core Theology — Architecture, Consciousness & Soul",
        "Theological Framework v4.3 — §§2–6",
        CORE_CONTENT
      )}
      {activeTab === "endings" && renderContentTab(
        "Endings, NPCs & The Infiltrator",

        ENDINGS_CONTENT
      )}
      {activeTab === "factions" && renderContentTab(
        "Factions, Karma & Design Principles",
        "Theological Framework v4.3 — §§9–11",
        FACTIONS_CONTENT
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
