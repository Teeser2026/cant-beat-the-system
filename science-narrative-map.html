                <div style={{ fontSize: "10px", color: row.color, letterSpacing: "1.5px", textTransform: "uppercase", fontWeight: 600, marginBottom: "4px" }}>
                  {row.layer}

                <div style={{ fontSize: "11px", color: "#999", lineHeight: 1.7, marginBottom: "4px" }}>{row.components}</div>
                <div style={{ fontSize: "10px", color: "#666", lineHeight: 1.6, fontStyle: "italic" }}>{row.fn}</div>
              </div>
            ))}
          </div>

          {/* Integration Principle */}
          <div style={{ borderLeft: "3px solid #ff5577", padding: "16px 20px", margin: "40px 0", background: "rgba(255,85,119,0.03)" }}>
            <div style={{ fontSize: "10px", color: "#ff5577", letterSpacing: "1.5px", textTransform: "uppercase", fontWeight: 600, marginBottom: "8px" }}>

            </p>
