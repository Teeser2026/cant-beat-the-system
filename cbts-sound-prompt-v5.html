<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBTS — Sound Prompt v5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

:root {
  --bg: #0c0b0e;
  --text: #c8c4b8;
  --dim: #6b6760;
  --bright: #e8e4d8;
  --warm: #c4956a;
  --inner: #c49090;
  --faint: #3a3530;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  overflow-x: hidden;
}

/* ── LAYOUT — full viewport ── */
.sound-prompt {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── TOP: text area ── */
.text-area {
  padding: 50px 20px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 10;
}

.the-frame {
  font-family: 'Crimson Pro', serif;
  font-size: 19px;
  font-weight: 300;
  font-style: italic;
  color: var(--dim);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeIn 2s ease forwards 0.3s;
  text-align: center;
}

.the-word-wrap {
  position: relative;
  margin-bottom: 16px;
}

.the-word {
  font-family: 'Crimson Pro', serif;
  font-size: 62px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 4px;
  color: var(--dim);
  user-select: none;
  text-align: center;
  position: relative;
  z-index: 2;
  transition: all 1.8s ease;
  opacity: 0;
  animation: wordReveal 3s ease forwards 1s;
}

.word-cloud {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 150px;
  border-radius: 50%;
  opacity: 0;
  filter: blur(50px);
  transition: opacity 3s, width 3s, height 3s;
  z-index: 1;
  pointer-events: none;
}
.word-cloud.active { opacity: 0.5; width: 400px; height: 200px; }

.word-proximity {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 240px;
  height: 140px;
  border-radius: 50%;
  opacity: 0;
  filter: blur(50px);
  background: radial-gradient(ellipse, rgba(196,149,106,0.25), transparent 70%);
  transition: opacity 0.3s;
  z-index: 1;
  pointer-events: none;
}

.the-word.matched {
  color: var(--bright);
  letter-spacing: 6px;
  text-shadow: 0 0 60px rgba(196,149,106,0.2);
}

.instruction {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: lowercase;
  color: rgba(58,53,48,0.6);
  text-align: center;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards 3.5s;
  transition: opacity 1s;
}

/* ── BOTTOM: image area — fills remaining space ── */
.image-area {
  flex: 1;
  position: relative;
  display: flex;
  opacity: 0;
  animation: fadeIn 2.5s ease forwards 2s;
  min-height: 300px;
}

/* Full image as background */
.triptych-bg {
  position: absolute;
  inset: 0;
  background-image: url('peace-triptych.png');
  background-size: cover;
  background-position: center;
  z-index: 1;
}

/* Top fade into dark */
.image-fade-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(to bottom, var(--bg), transparent);
  z-index: 2;
  pointer-events: none;
}

/* Bottom fade */
.image-fade-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(to top, var(--bg), transparent);
  z-index: 2;
  pointer-events: none;
}

/* Three interactive zones over the image */
.zone {
  flex: 1;
  position: relative;
  z-index: 5;
  cursor: pointer;
  touch-action: none;
  transition: all 0.5s;
}

/* Divider lines between zones */
.zone:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 15%;
  right: 0;
  bottom: 15%;
  width: 1px;
  background: rgba(200,196,184,0.08);
  z-index: 6;
}

/* Hover: brighten this zone, dim others */
.zone-overlay {
  position: absolute;
  inset: 0;
  background: rgba(12,11,14,0);
  transition: background 0.5s;
  pointer-events: none;
}

.zone:hover .zone-overlay {
  background: rgba(12,11,14,0);
}

.zones-hovering .zone .zone-overlay {
  background: rgba(12,11,14,0.35);
}

.zones-hovering .zone:hover .zone-overlay {
  background: rgba(12,11,14,0);
}

/* Playing glow */
.zone.playing .zone-overlay {
  background: rgba(196,149,106,0.04) !important;
}

.zone.playing {
  /* subtle brightness lift */
}

/* Dragging */
.zone.dragging-active .zone-overlay {
  background: rgba(12,11,14,0.5) !important;
}

/* Match states */
.zone.faded .zone-overlay {
  background: rgba(12,11,14,0.75) !important;
  transition: background 2s;
}

.zone.matched-zone .zone-overlay {
  background: rgba(12,11,14,0) !important;
}

/* Play button */
.zone-play {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(200,196,184,0.15);
  background: rgba(12,11,14,0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.5s;
  z-index: 8;
  pointer-events: none;
}

.zone:hover .zone-play {
  border-color: rgba(200,196,184,0.35);
  background: rgba(12,11,14,0.45);
}

.zone.playing .zone-play {
  border-color: rgba(196,149,106,0.5);
  background: rgba(12,11,14,0.5);
}

.zone-play svg {
  width: 12px;
  height: 12px;
  fill: rgba(200,196,184,0.35);
  transition: fill 0.5s;
}

.zone.playing .zone-play svg {
  fill: var(--warm);
}

/* Progress bar at bottom of zone */
.zone-progress {
  position: absolute;
  bottom: 0;
  left: 10%;
  width: 80%;
  height: 2px;
  border-radius: 1px;
  overflow: hidden;
  z-index: 8;
}

.zone-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, transparent, var(--warm), transparent);
  border-radius: 1px;
}

/* ── DRAG GHOST ── */
.drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 1000;
  width: 120px;
  height: 80px;
  border-radius: 10px;
  overflow: hidden;
  opacity: 0.85;
  transition: filter 0.4s, opacity 0.4s, transform 0.4s;
  display: none;
  box-shadow: 0 14px 50px rgba(0,0,0,0.6);
}

.drag-ghost::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  box-shadow: inset 0 0 20px 10px rgba(12,11,14,0.3);
  pointer-events: none;
}

.drag-ghost .ghost-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.drag-ghost.near-word {
  filter: blur(12px);
  opacity: 0.45;
  transform: scale(0.65);
}

.drag-ghost.very-near {
  filter: blur(26px);
  opacity: 0.15;
  transform: scale(0.35);
}

/* ── AFTERMATH ── */
.aftermath-area {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0 20px 40px;
}

.aftermath {
  font-family: 'Crimson Pro', serif;
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
  line-height: 2;
  color: var(--inner);
  opacity: 0;
  transition: opacity 3s;
}
.aftermath.visible { opacity: 1; }

.reset-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--faint);
  background: none;
  border: 1px solid rgba(58,53,48,0.3);
  padding: 8px 16px;
  margin-top: 20px;
  cursor: pointer;
  transition: all 0.3s;
  display: none;
}
.reset-btn:hover { color: var(--dim); border-color: var(--dim); }

/* ── ANIMATIONS ── */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes wordReveal {
  0% { opacity: 0; letter-spacing: 16px; }
  50% { opacity: 0.4; }
  100% { opacity: 1; letter-spacing: 4px; }
}

/* ── MOBILE ── */
@media (max-width: 520px) {
  .the-word { font-size: 42px; }
  .the-frame { font-size: 16px; }
  .text-area { padding: 30px 16px 16px; }
  .zone-play { width: 34px; height: 34px; bottom: 20px; }
  .zone-play svg { width: 10px; height: 10px; }
}
</style>
</head>
<body>

<div class="sound-prompt">

  <!-- TEXT -->
  <div class="text-area">
    <div class="the-frame">which sound brings you the most</div>
    <div class="the-word-wrap" id="wordWrap">
      <div class="word-cloud" id="wordCloud"></div>
      <div class="word-proximity" id="wordProximity"></div>
      <div class="the-word" id="theWord">peace</div>
    </div>
    <div class="instruction" id="instruction">listen to each — then move your answer to the word</div>
  </div>

  <!-- IMAGE — fills remaining viewport -->
  <div class="image-area" id="imageArea">
    <div class="triptych-bg"></div>
    <div class="image-fade-top"></div>
    <div class="image-fade-bottom"></div>

    <div class="zone" data-clip="0" id="zone-0">
      <div class="zone-overlay"></div>
      <div class="zone-play"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>
      <div class="zone-progress"><div class="zone-progress-fill" id="prog-0"></div></div>
    </div>

    <div class="zone" data-clip="1" id="zone-1">
      <div class="zone-overlay"></div>
      <div class="zone-play"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>
      <div class="zone-progress"><div class="zone-progress-fill" id="prog-1"></div></div>
    </div>

    <div class="zone" data-clip="2" id="zone-2">
      <div class="zone-overlay"></div>
      <div class="zone-play"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>
      <div class="zone-progress"><div class="zone-progress-fill" id="prog-2"></div></div>
    </div>
  </div>

  <!-- AFTERMATH -->
  <div class="aftermath-area">
    <div class="aftermath" id="aftermath"></div>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>

</div>

<div class="drag-ghost" id="dragGhost"></div>

<script>
const CLIPS = [
  { file: 'gong.mp3', color: '#8a7a50', pos: '16.5% center' },
  { file: 'whale.mp3', color: '#2a4a5e', pos: '50% center' },
  { file: 'lowchant.mp3', color: '#4a5a3a', pos: '83.5% center' }
];

const AFTERMATH = [
  'A single strike — and the silence after it holds everything.',
  'Something vast, underneath. It was always there.',
  'Voices older than language. The flame doesn\'t flicker.'
];

let audios = [], currentPlaying = -1, matched = -1, isDragging = false, dragIndex = -1;
let startX = 0, startY = 0;

CLIPS.forEach((c, i) => {
  const a = new Audio(c.file);
  a.preload = 'auto';
  a.addEventListener('ended', () => stopAll());
  a.addEventListener('timeupdate', () => {
    if (a.duration) document.getElementById('prog-' + i).style.width = ((a.currentTime / a.duration) * 100) + '%';
  });
  audios.push(a);
});

function stopAll() {
  audios.forEach((a, i) => { a.pause(); a.currentTime = 0; document.getElementById('prog-' + i).style.width = '0%'; });
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('playing'));
  currentPlaying = -1;
  updateIcons();
}

function playClip(i) {
  if (matched >= 0 || isDragging) return;
  if (currentPlaying === i) { stopAll(); return; }
  stopAll();
  audios[i].play().catch(() => {});
  currentPlaying = i;
  document.getElementById('zone-' + i).classList.add('playing');
  updateIcons();
}

function updateIcons() {
  document.querySelectorAll('.zone-play').forEach((btn, i) => {
    btn.innerHTML = i === currentPlaying
      ? '<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" fill="currentColor"/><rect x="14" y="5" width="4" height="14" fill="currentColor"/></svg>'
      : '<svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>';
  });
}

// Hover dimming
const imageArea = document.getElementById('imageArea');
document.querySelectorAll('.zone').forEach(z => {
  z.addEventListener('mouseenter', () => imageArea.classList.add('zones-hovering'));
  z.addEventListener('mouseleave', () => { if (!isDragging) imageArea.classList.remove('zones-hovering'); });
});

// Click to play
document.querySelectorAll('.zone').forEach((zone, i) => {
  zone.addEventListener('click', () => { if (!isDragging) playClip(i); });
});

// ── Drag ──
const dragGhost = document.getElementById('dragGhost');
const wordWrap = document.getElementById('wordWrap');
const wordCloud = document.getElementById('wordCloud');
const wordProximity = document.getElementById('wordProximity');
const theWord = document.getElementById('theWord');

document.querySelectorAll('.zone').forEach((zone, i) => {

  zone.addEventListener('pointerdown', (e) => {
    if (matched >= 0) return;
    startX = e.clientX; startY = e.clientY;
    zone.setPointerCapture(e.pointerId);
  });

  zone.addEventListener('pointermove', (e) => {
    if (matched >= 0 || !zone.hasPointerCapture(e.pointerId)) return;
    const dist = Math.sqrt((e.clientX - startX) ** 2 + (e.clientY - startY) ** 2);

    if (!isDragging && dist > 14) {
      isDragging = true;
      dragIndex = i;
      zone.classList.add('dragging-active');
      imageArea.classList.add('zones-hovering');
      // Ghost shows this zone's portion
      dragGhost.innerHTML = '<img class="ghost-img" src="peace-triptych.png" style="object-position:' + CLIPS[i].pos + ';">';
      dragGhost.style.display = 'block';
      stopAll();
    }

    if (isDragging) {
      e.preventDefault();
      dragGhost.style.left = (e.clientX - 60) + 'px';
      dragGhost.style.top = (e.clientY - 40) + 'px';

      const wr = wordWrap.getBoundingClientRect();
      const wcx = wr.left + wr.width / 2, wcy = wr.top + wr.height / 2;
      const dw = Math.sqrt((e.clientX - wcx) ** 2 + (e.clientY - wcy) ** 2);

      if (dw < 80) {
        dragGhost.className = 'drag-ghost very-near';
        wordProximity.style.opacity = '0.8';
        theWord.style.color = 'var(--bright)';
      } else if (dw < 220) {
        dragGhost.className = 'drag-ghost near-word';
        wordProximity.style.opacity = ((1 - (dw - 80) / 140) * 0.5).toFixed(2);
        theWord.style.color = 'var(--text)';
      } else {
        dragGhost.className = 'drag-ghost';
        wordProximity.style.opacity = '0';
        theWord.style.color = 'var(--dim)';
      }
    }
  });

  zone.addEventListener('pointerup', (e) => {
    if (matched >= 0) return;
    zone.classList.remove('dragging-active');

    if (isDragging && dragIndex === i) {
      const wr = wordWrap.getBoundingClientRect();
      const dw = Math.sqrt((e.clientX - (wr.left + wr.width / 2)) ** 2 + (e.clientY - (wr.top + wr.height / 2)) ** 2);
      if (dw < 130) { completeMatch(i); } else { cancelDrag(); }
    }
    isDragging = false; dragIndex = -1;
    imageArea.classList.remove('zones-hovering');
  });

  zone.addEventListener('pointercancel', () => {
    zone.classList.remove('dragging-active');
    cancelDrag(); isDragging = false; dragIndex = -1;
    imageArea.classList.remove('zones-hovering');
  });
});

function cancelDrag() {
  dragGhost.style.display = 'none';
  dragGhost.className = 'drag-ghost';
  wordProximity.style.opacity = '0';
  theWord.style.color = '';
}

function completeMatch(i) {
  matched = i;
  stopAll();

  dragGhost.style.transition = 'opacity 2s, filter 2s, transform 2s';
  dragGhost.style.opacity = '0';
  dragGhost.style.filter = 'blur(40px)';
  dragGhost.style.transform = 'scale(0.1)';
  setTimeout(() => { dragGhost.style.display = 'none'; dragGhost.style.cssText = ''; dragGhost.className = 'drag-ghost'; }, 2100);

  theWord.classList.add('matched');
  wordCloud.style.background = 'radial-gradient(ellipse, ' + CLIPS[i].color + ', transparent 70%)';
  wordCloud.classList.add('active');
  wordProximity.style.opacity = '0';

  document.getElementById('instruction').style.opacity = '0';
  document.querySelector('.the-frame').style.transition = 'opacity 2s';
  document.querySelector('.the-frame').style.opacity = '0.2';

  document.querySelectorAll('.zone').forEach((z, j) => {
    if (j === i) {
      z.classList.add('matched-zone');
      setTimeout(() => { audios[i].volume = 0.3; audios[i].play().catch(() => {}); z.classList.add('playing'); updateIcons(); }, 1200);
    } else {
      z.classList.add('faded');
    }
  });

  setTimeout(() => { document.getElementById('aftermath').textContent = AFTERMATH[i]; document.getElementById('aftermath').classList.add('visible'); }, 2800);
  setTimeout(() => { document.getElementById('resetBtn').style.display = 'inline-block'; }, 5500);
}

document.getElementById('resetBtn').addEventListener('click', () => {
  matched = -1; isDragging = false; dragIndex = -1;
  stopAll(); audios.forEach(a => a.volume = 1);
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('matched-zone', 'faded', 'dragging-active', 'playing'));
  theWord.classList.remove('matched'); theWord.style.color = '';
  wordCloud.classList.remove('active'); wordProximity.style.opacity = '0';
  dragGhost.style.display = 'none'; dragGhost.className = 'drag-ghost';
  document.querySelector('.the-frame').style.opacity = '';
  document.getElementById('aftermath').classList.remove('visible');
  document.getElementById('aftermath').textContent = '';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('instruction').style.opacity = '1';
  imageArea.classList.remove('zones-hovering');
});
</script>

</body>
</html>
