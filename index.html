let state = {
  activeView: "map",
  selectedFaction: null,
  selectedConnection: null,
  hoveredFaction: null
};

function getFaction(id) { return FACTIONS.find(f => f.id === id); }

function getConnections(factionId) {
  return CONNECTIONS.filter(c => c.from === factionId || c.to === factionId);
}

function isConnected(factionId) {
  if (!state.selectedFaction) return true;
  if (factionId === state.selectedFaction) return true;
  const conns = getConnections(state.selectedFaction);
  return conns.some(c => c.from === factionId || c.to === factionId);
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function switchView(view) {
  state.activeView = view;
  state.selectedFaction = null;
  state.selectedConnection = null;

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });

  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.getElementById(view + '-view').classList.add('active');

  if (view === 'g3p') renderG3P();
  if (view === 'cyber') renderCyber();
  if (view === 'map') renderMap();
}

function renderMap() {
  renderConnectionLines();
  renderFactionNodes();
  renderSidePanel();

  const ci = document.getElementById('center-indicator');
  ci.style.display = state.selectedFaction ? 'none' : 'block';
}

function renderConnectionLines() {
  const svg = document.getElementById('connections-svg');
  svg.innerHTML = '';

  CONNECTIONS.forEach((conn, i) => {
    const fromF = getFaction(conn.from);
    const toF = getFaction(conn.to);
    if (!fromF || !toF) return;

    const isActive = !state.selectedFaction || conn.from === state.selectedFaction || conn.to === state.selectedFaction;
    const isSelected = state.selectedConnection === i;
    const opacity = state.selectedFaction ? (isActive ? 0.7 : 0.05) : 0.2;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', fromF.x + '%');
    line.setAttribute('y1', fromF.y + '%');
    line.setAttribute('x2', toF.x + '%');
    line.setAttribute('y2', toF.y + '%');
    line.setAttribute('stroke', isSelected ? '#fff' : '#444');
    line.setAttribute('stroke-width', isSelected ? 2 : conn.strength === 3 ? 1.5 : 0.8);
    line.setAttribute('opacity', opacity);
    line.setAttribute('stroke-linecap', 'round');
    line.style.cursor = 'pointer';
    line.style.transition = 'all 0.4s ease';
    if (conn.strength < 3) line.setAttribute('stroke-dasharray', '4 4');

    line.addEventListener('click', (e) => {
      e.stopPropagation();
      state.selectedConnection = isSelected ? null : i;
      renderMap();
    });
    svg.appendChild(line);
  });
}

function renderFactionNodes() {
  const container = document.getElementById('faction-nodes');
  container.innerHTML = '';

  FACTIONS.forEach(f => {
    const connected = isConnected(f.id);
    const isSelected = state.selectedFaction === f.id;

    const node = document.createElement('div');
    node.className = 'faction-node';
    node.style.left = f.x + '%';
    node.style.top = f.y + '%';
    node.style.transform = 'translate(-50%, -50%)';
    node.style.opacity = connected ? 1 : 0.15;

    const label = document.createElement('div');
    label.className = 'faction-label';
    label.style.color = f.color;
    label.style.opacity = connected ? 1 : 0.3;
    label.textContent = f.short;

    const dot = document.createElement('div');
    dot.className = 'faction-dot';
    dot.style.background = f.color;
    dot.style.color = f.color;
    dot.style.boxShadow = '0 0 20px ' + f.color;
    dot.style.transform = isSelected ? 'scale(1.8)' : 'scale(1)';
    dot.style.border = isSelected ? '2px solid #fff' : 'none';

    node.addEventListener('click', () => {
      state.selectedFaction = isSelected ? null : f.id;
      state.selectedConnection = null;
      renderMap();
    });

    node.addEventListener('mouseenter', () => {
      dot.style.transform = isSelected ? 'scale(1.8)' : 'scale(1.3)';
      dot.style.boxShadow = '0 0 40px ' + f.color;
    });
    node.addEventListener('mouseleave', () => {
      dot.style.transform = isSelected ? 'scale(1.8)' : 'scale(1)';
      dot.style.boxShadow = '0 0 20px ' + f.color;
    });

    node.appendChild(label);
    node.appendChild(dot);
    container.appendChild(node);
  });
}
