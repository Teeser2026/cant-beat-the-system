// ─── NODE MAP ───
function NodeMap({ sections, selectedNode, hoveredNode, setHoveredNode, onNodeClick, connectedIds }) {
  const mapRef = useRef(null);
  const [dims, setDims] = useState({ w: 800, h: 600 });

  useEffect(() => {
    const el = mapRef.current;
    if (!el) return;
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      setDims({ w: width, h: height });
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  // Build connection pairs
  const connections = useMemo(() => {
    const pairs = [];
    const seen = new Set();
    sections.forEach(s => {
      (s.connections || []).forEach(cId => {
        const key = [s.id, cId].sort().join("--");
        if (!seen.has(key)) {
          seen.add(key);
          const target = sections.find(t => t.id === cId);
          if (target) pairs.push({ from: s, to: target, key });
        }
      });
    });
    return pairs;
  }, [sections]);

  const sidebarWidth = 380;

  return React.createElement("div", { style: { display: "flex", flex: 1, overflow: "hidden" } },
    // Map area
    React.createElement("div", { ref: mapRef, style: { flex: 1, position: "relative", overflow: "hidden", background: "#0a0a0f" } },
      // Scan line
      React.createElement("div", { style: { position: "absolute", top: 0, left: 0, width: "100%", height: "1px",
        background: "rgba(0,255,136,0.12)", animation: "scan 10s linear infinite", zIndex: 0, pointerEvents: "none" } }),
      // SVG connections
      React.createElement("svg", { style: { position: "absolute", top: 0, left: 0, width: "100%", height: "100%", zIndex: 1, pointerEvents: "none" } },
        connections.map(c => {
          const x1 = (c.from.x / 100) * dims.w;
          const y1 = (c.from.y / 100) * dims.h;
          const x2 = (c.to.x / 100) * dims.w;
          const y2 = (c.to.y / 100) * dims.h;
          const isActive = selectedNode && (connectedIds.has(c.from.id) && connectedIds.has(c.to.id));
          const isDimmed = selectedNode && !isActive;
          return React.createElement("line", {
            key: c.key, x1, y1, x2, y2,
            stroke: isActive ? selectedNode.color : "#333",
            strokeWidth: isActive ? 1.5 : 0.7,
            opacity: isDimmed ? 0.03 : isActive ? 0.55 : 0.1
          });
        })
      ),
      // Nodes
      sections.map(s => {
        const isSelected = selectedNode?.id === s.id;
        const isConnected = connectedIds.has(s.id);
        const isDimmed = selectedNode && !isConnected;
        const isHovered = hoveredNode === s.id;
        const dotSize = isHovered || isSelected ? 18 : 14;
        return React.createElement("div", {
          key: s.id,
          style: { position: "absolute", left: s.x + "%", top: s.y + "%", transform: "translate(-50%, -50%)",
            zIndex: 2, cursor: "pointer", opacity: isDimmed ? 0.2 : 1, transition: "opacity 0.3s" },
          onClick: () => onNodeClick(s),
          onMouseEnter: () => setHoveredNode(s.id),
          onMouseLeave: () => setHoveredNode(null)
        },
          // Label
          React.createElement("div", {
            style: { fontSize: "10px", letterSpacing: "1.5px", textTransform: "uppercase", color: s.color,
              textAlign: "center", marginBottom: "4px", whiteSpace: "nowrap", fontFamily: "'IBM Plex Mono', monospace",
              textShadow: "0 0 8px rgba(0,0,0,0.8)" }
          }, s.title),
          // Dot
          React.createElement("div", {
            style: { width: dotSize + "px", height: dotSize + "px", borderRadius: "50%", background: s.color,
              margin: "0 auto", boxShadow: `0 0 ${isHovered || isSelected ? 30 : 20}px ${s.color}`,
              transition: "all 0.2s", border: isSelected ? "2px solid #fff" : "none" }
          }),
          // Num
          React.createElement("div", {
            style: { fontSize: "8px", color: "#555", textAlign: "center", marginTop: "2px",
              fontFamily: "'IBM Plex Mono', monospace", letterSpacing: "1px" }
          }, s.num)
        );
      })
    ),
    // Sidebar
    React.createElement("div", {
      className: "scroll-panel",
      style: { width: sidebarWidth + "px", background: "rgba(10,10,15,0.95)", borderLeft: "1px solid #222",
        padding: "20px", fontSize: "12px", lineHeight: "1.7", overflowY: "auto", flexShrink: 0 }
    },
      selectedNode
        ? React.createElement(React.Fragment, null,
            // Section label
            React.createElement("div", {
              style: { fontSize: "9px", letterSpacing: "1.5px", textTransform: "uppercase", color: "#555", marginBottom: "4px" }
            }, "Transhumanism Deep Dive v1.3"),
            // Num + Part
            React.createElement("div", {
              style: { fontSize: "9px", letterSpacing: "1px", color: selectedNode.color, marginBottom: "8px", textTransform: "uppercase" }
            }, selectedNode.num + " — " + selectedNode.partLabel),
            // Title
            React.createElement("h2", {

              },
                React.createElement("div", { style: { fontSize: "9px", color: target.color, marginBottom: "1px" } }, target.num),
                React.createElement("div", { style: { fontSize: "10px", color: "#ccc" } }, target.title)
              );
            })
          )
        : React.createElement("div", { style: { display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", height: "100%", opacity: 0.4 } },
            React.createElement("div", { style: { fontSize: "11px", color: "#555", textAlign: "center", lineHeight: 1.8 } },
              "Select a node to explore",

  );
}
