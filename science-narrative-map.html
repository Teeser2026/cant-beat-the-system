            border: "1px solid rgba(255,170,34,0.2)",
            background: "rgba(255,170,34,0.03)",
            animation: "pulse 3s ease-in-out infinite",
            pointerEvents: "none",
            zIndex: 3
          }} />

          {/* Nodes */}
          {SECTIONS.map(section => {
            const isSel = selectedId === section.id;
            const visible = isNodeVisible(section.id);
            const isConv = section.id === "convergence";

            return (
              <div
                key={section.id}
                className="node-wrapper"
                style={{
                  left: `${section.x}%`,
                  top: `${section.y}%`,
                  transform: "translate(-50%, -50%)",
                  opacity: visible ? 1 : 0.12,
                  zIndex: isSel ? 20 : 10
                }}
                onClick={(e) => {
                  e.stopPropagation(); firstInteraction(); playClick();
                  setSelectedId(prev => prev === section.id ? null : section.id);
                }}
                onMouseEnter={() => setHoveredId(section.id)}
                onMouseLeave={() => setHoveredId(null)}
              >
                <div className="node-label" style={{
                  color: section.color,
                  opacity: isSel || hoveredId === section.id ? 1 : 0.5,
                  fontSize: "10px",
                  fontWeight: isConv ? 600 : 500
                }}>
                  {section.title}
                </div>
                <div className="node-dot" style={{
                  background: section.color,
                  color: section.color,
                  width: isConv ? "18px" : undefined,
                  height: isConv ? "18px" : undefined,
                  boxShadow: isConv ? `0 0 30px ${section.color}` : undefined
                }} />
              </div>
            );
          })}
        </div>

        {/* Right sidebar */}
        <div className="scroll-panel" style={{
          width: "380px",
          flexShrink: 0,
          background: "rgba(10,10,15,0.95)",
          borderLeft: "1px solid #222",
          padding: "20px",
          fontSize: "12px",
          lineHeight: "1.7",
          overflowY: "auto"
        }}>
          {selectedSection ? (
            <div>
              {/* Dot + title */}
              <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "16px" }}>
                <div style={{
                  width: "10px", height: "10px", borderRadius: "50%",
                  background: selectedSection.color,
                  boxShadow: `0 0 15px ${selectedSection.color}`,
                  flexShrink: 0
                }} />
                <span style={{ fontSize: "14px", fontWeight: 600, color: selectedSection.color, letterSpacing: "1px" }}>
                  {selectedSection.title}
                </span>
              </div>

              {/* Part badge */}
              <div style={{
                fontSize: "9px", color: "#888", letterSpacing: "1px", textTransform: "uppercase",
                marginBottom: "12px", padding: "4px 8px", border: "1px solid #333", display: "inline-block"
              }}>
                {selectedSection.partLabel} · {selectedSection.num}
              </div>

              {/* Summary */}
              <p style={{ color: "#999", lineHeight: 1.8, marginBottom: "16px" }}>
                {selectedSection.summary}
              </p>

              {/* Keywords */}
              <div style={{ marginBottom: "16px" }}>
                <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>Keywords</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "4px" }}>
                  {selectedSection.keywords.map(kw => (
                    <span key={kw} className="tag" style={{ color: selectedSection.color, borderColor: `${selectedSection.color}44` }}>
                      {kw}
                    </span>
                  ))}
                </div>
              </div>

              {/* Connections */}
              {selectedSection.connections?.length > 0 && (
                <div>
                  <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>
                    Connections ({selectedSection.connections.length})
                  </div>
                  {selectedSection.connections.map(connId => {
                    const conn = sectionMap[connId];
                    if (!conn) return null;
                    return (
                      <div
                        key={connId}
                        className="conn-row"
                        style={{ borderLeft: `2px solid ${conn.color}` }}
                        onClick={() => { playClick(); setSelectedId(connId); }}
                      >
                        <div style={{ fontSize: "10px", color: conn.color }}>
                          → {conn.num} {conn.title}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          ) : (
            <div>
              <p style={{ color: "#666", marginBottom: "16px" }}>Click a node to explore.</p>
              <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "12px" }}>
                {SECTIONS.length} sections · {connectionLines.length} connections
              </div>

              {/* Legend */}
              <div style={{ fontSize: "9px", color: "#555", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>Legend</div>
              <div style={{ display: "flex", flexDirection: "column", gap: "6px", marginBottom: "16px" }}>
                {[
                  { label: "Documented Science", color: "#00ff88" },
                  { label: "The Convergence", color: "#ffaa22" },
                  { label: "Game Framework", color: "#ff6644" },
                  { label: "Reader Discovery", color: "#44aaff" }
                ].map(item => (
                  <div key={item.label} style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                    <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: item.color, flexShrink: 0 }} />
                    <span style={{ fontSize: "10px", color: "#888" }}>{item.label}</span>
                  </div>
                ))}
              </div>

              {/* All nodes */}
              <div style={{ borderTop: "1px solid #1a1a22", paddingTop: "12px" }}>
                {SECTIONS.map(s => (
                  <div
                    key={s.id}
                    style={{
                      display: "flex", alignItems: "center", gap: "8px",
                      padding: "3px 0", cursor: "pointer"
                    }}
                    onClick={() => { playClick(); setSelectedId(s.id); }}
                    onMouseEnter={() => setHoveredId(s.id)}
                    onMouseLeave={() => setHoveredId(null)}
                  >
                    <div style={{ width: "6px", height: "6px", borderRadius: "50%", background: s.color, flexShrink: 0 }} />
                    <span style={{ fontSize: "10px", color: s.color, opacity: 0.6, minWidth: "36px" }}>{s.num}</span>
                    <span style={{ fontSize: "10px", color: "#888" }}>{s.title}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ScienceNarrativeMap));
</script>
</body>
</html>
